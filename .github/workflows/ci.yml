name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: python3 -m pip install -e .

      - name: Run full test suite
        run: python3 -m unittest discover -v

      - name: Check ABH document consistency
        run: python3 -m abh doctor --json

      - name: Check ABH roadmap consistency
        run: python3 -m abh roadmap check --json

      - name: Check diff whitespace
        run: git diff --check

      - name: Report ABH health posture
        run: python3 -m abh report health --json
